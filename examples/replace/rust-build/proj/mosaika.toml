[[transform]]
name = "blank"
delimiters = ["/*blank*/", "/*end*/"]
# replace everything inclusively between delimiters with empty string
action = { replace = "" }

[[transform]]
name = "todo"
# supports capturing groups
delimiters = [{ regex = '/\*todo:(([^*]|\*[^/])*)\*/' }, "/*end*/"]
# use {0} to refer to the capturing group at 0-based index
# to type curly braces, use double curly braces
action = { replace = 'todo!("{0}")' }

[[transaction]]
src = "Cargo.toml"
dst = "../prod/Cargo.toml"
transform = []

[[transaction]]
src = "build.rs"
dst = "../prod/build.rs"
transform = ["blank"]

[[transaction]]
src = "src"
dst = "../prod/src"
pattern = ["**/*"]
transform = ["blank", "todo"]

[[post]]
dir = "../prod"
cmd = "cargo fmt"
