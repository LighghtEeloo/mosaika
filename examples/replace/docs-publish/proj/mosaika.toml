[[transform]]
name = "blank-html"
delimiters = ["<!--blank-->", "<!--end-->"]
effects = [{ replace = "" }]

[[transform]]
name = "blank-hash"
delimiters = ["# blank", "# end"]
effects = [{ replace = "" }]

[[transform]]
name = "todo-html"
delimiters = [{ regex = '<!--todo:([^>]*)-->' }, "<!--end-->"]
effects = [{ replace = 'TODO: {0}' }]

[[transaction]]
src = "README.md"
dst = "../prod/README.md"
transform = ["blank-html", "todo-html"]

[[transaction]]
src = "mkdocs.yml"
dst = "../prod/mkdocs.yml"
transform = ["blank-hash"]

[[transaction]]
src = "scripts"
dst = "../prod/scripts"
pattern = ["**/*"]
transform = ["blank-hash"]
