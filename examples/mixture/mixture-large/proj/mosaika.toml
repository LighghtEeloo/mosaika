[[transform]]
name = "license"
delimiters = ["/* license:start */", "/* license:end */"]
effects = [{ replace = "// SPDX-License-Identifier: MIT" }]

[[transform]]
name = "todo"
delimiters = [{ regex = '/\*todo:([^*]+)\*/' }, "/*end*/"]
effects = [{ replace = 'todo!("{0}")' }, { log = true }]

[[transform]]
name = "release-window"
delimiters = ["# release:start", "# release:middle", "# release:end"]
effects = [{ replace = "owner = \"release\"\nwindow = \"stable\"" }]

[[transform]]
name = "note"
delimiters = ["<!--note:start-->", "<!--note:end-->"]
effects = [{ replace = "Release build." }]

[[transaction]]
src = "src"
dst = "../prod/src"
log = "../prod/todo-log.jsonl"
pattern = ["**/*.rs"]
transform = ["license", "todo"]

[[transaction]]
src = "config"
dst = "../prod/config"
pattern = ["**/*.toml"]
transform = ["release-window"]

[[transaction]]
src = "README.md"
dst = "../prod/README.md"
transform = ["note"]

[[transaction]]
src = "scripts"
dst = "../prod/scripts"
pattern = ["**/*"]
transform = []

[[post]]
dir = "../prod"
cmd = "printf 'release-ready\n' > stamp.txt"
